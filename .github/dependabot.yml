version: 2
updates:
  # Keep GitHub Actions pinned versions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Base-image updates (FROM tags) for both service Dockerfiles.
  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /client
    schedule:
      interval: weekly

  # Python dependencies (Poetry).
  - package-ecosystem: pip
    directory: /server
    schedule:
      interval: weekly

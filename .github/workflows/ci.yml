name: CI

# Build, test, and package both services into Docker images on every push.
# Images are pushed to GHCR on push events; pull requests build only (no push).
on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

# Newer pushes to the same ref cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ── Frontend quality gate: Biome + TypeScript ───────────────────────────────
  frontend-checks:
    name: Frontend lint + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit

  # ── Backend tests: the Dockerfile `test` stage runs pytest during build ──────
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.9.0
      - name: Build test stage (runs pytest)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.9.0
        with:
          context: ./server
          target: test
          push: false
          load: false
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  # ── Build + push both images ────────────────────────────────────────────────
  build-and-push:
    name: Build & push ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [frontend-checks, backend-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            context: ./server
            target: runtime
          - name: client
            context: ./client
            target: ""
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.9.0

      # Only log in when we intend to push (skips forked-PR runs that lack access).
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.9.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.9.0
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          # Push on push events; PRs validate the build without publishing.
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

services:
  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # bgutil PO-token provider — supplies YouTube PO tokens to the yt-dlp plugin
  # baked into the server image, clearing YouTube's anti-bot ("confirm you're not
  # a bot") wall automatically. The api/worker reach it at http://bgutil:4416.
  bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tensa}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tensa}
      - POSTGRES_DB=${POSTGRES_DB:-tensa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-tensa} -d $${POSTGRES_DB:-tensa}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./server
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-tensa}:${POSTGRES_PASSWORD:-tensa}@postgres:5432/${POSTGRES_DB:-tensa}
      - DOWNLOAD_DIR=/app/downloads
      - WHISPER_MODELS_DIR=/app/models
      - RATE_LIMIT_PER_HOUR=20
      - CORS_ORIGINS=http://localhost:3000
      - MAX_DOWNLOAD_FILESIZE=${MAX_DOWNLOAD_FILESIZE:-4G}
      - YOUTUBE_COOKIES_FILE=${YOUTUBE_COOKIES_FILE:-}
      - YOUTUBE_PLAYER_CLIENTS=${YOUTUBE_PLAYER_CLIENTS:-}
      - YOUTUBE_PO_TOKEN=${YOUTUBE_PO_TOKEN:-}
      - YOUTUBE_POT_PROVIDER_URL=${YOUTUBE_POT_PROVIDER_URL:-http://bgutil:4416}
    volumes:
      - downloads:/app/downloads
      - models:/app/models
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build: ./server
    command: arq src.worker.WorkerSettings
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-tensa}:${POSTGRES_PASSWORD:-tensa}@postgres:5432/${POSTGRES_DB:-tensa}
      - DOWNLOAD_DIR=/app/downloads
      - WHISPER_MODELS_DIR=/app/models
      - WORKER_MAX_JOBS=${WORKER_MAX_JOBS:-4}
      - WORKER_JOB_TIMEOUT=${WORKER_JOB_TIMEOUT:-600}
      - MAX_DOWNLOAD_FILESIZE=${MAX_DOWNLOAD_FILESIZE:-4G}
      - YOUTUBE_COOKIES_FILE=${YOUTUBE_COOKIES_FILE:-}
      - YOUTUBE_PLAYER_CLIENTS=${YOUTUBE_PLAYER_CLIENTS:-}
      - YOUTUBE_PO_TOKEN=${YOUTUBE_PO_TOKEN:-}
      - YOUTUBE_POT_PROVIDER_URL=${YOUTUBE_POT_PROVIDER_URL:-http://bgutil:4416}
    volumes:
      - downloads:/app/downloads
      - models:/app/models
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Browser-facing absolute API base (SSE stream + file downloads go direct
      # to the API). Read at request time by app/layout.tsx and injected into the
      # page, so it's configurable without rebuilding. Set this to the URL the
      # *browser* can reach the API at (e.g. https://api.yourhost.tld in prod).
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8000}
      # Server-side: Server Actions reach the API over the private network.
      - INTERNAL_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
  downloads:
  models:
